// localStorage Persistence
const STORAGE_KEY = "nurseSchedulerPro_data";
function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.warn("Save failed", e); }
}
function loadFromStorage() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}
function clearStorage() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

const SHIFT_TYPES = [
  { id: "morning", name: "Morning (8h)", start: "07:00", end: "15:00", hours: 8, color: "#FEF3C7", text: "#92400E", icon: "\u2600\uFE0F", isSplit: false, group: "8hr" },
  { id: "afternoon", name: "Afternoon (8h)", start: "15:00", end: "23:00", hours: 8, color: "#DBEAFE", text: "#1E40AF", icon: "\uD83C\uDF24\uFE0F", isSplit: false, group: "8hr" },
  { id: "night", name: "Night (8h)", start: "23:00", end: "07:00", hours: 8, color: "#EDE9FE", text: "#5B21B6", icon: "\uD83C\uDF19", isSplit: false, group: "8hr" },
  { id: "day12", name: "Day (12h)", start: "07:00", end: "19:00", hours: 12, color: "#FEF9C3", text: "#854D0E", icon: "\uD83C\uDF1E", isSplit: false, group: "12hr" },
  { id: "night12", name: "Night (12h)", start: "19:00", end: "07:00", hours: 12, color: "#C7D2FE", text: "#3730A3", icon: "\uD83C\uDF1C", isSplit: false, group: "12hr" },
  { id: "split_a", name: "Split A", start: "07:00\u201311:00 / 17:00\u201321:00", end: "", hours: 8, color: "#FCE7F3", text: "#9D174D", icon: "\uD83D\uDD00", isSplit: true, group: "split" },
  { id: "split_b", name: "Split B", start: "11:00\u201315:00 / 19:00\u201323:00", end: "", hours: 8, color: "#D1FAE5", text: "#065F46", icon: "\uD83D\uDD04", isSplit: true, group: "split" },
];
const CORE_8 = ["morning", "afternoon", "night"];
const CORE_12 = ["day12", "night12"];
const DAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const FDAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function genCode(i) {
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  const a = letters[Math.floor(i / 26) % 24];
  const b = letters[i % 24];
  return `N${String(i + 1).padStart(3, "0")}${a}${b}`;
}
function addD(date, days) { const d = new Date(date); d.setDate(d.getDate() + days); return d; }
function fmt(date) { return date.toISOString().split("T")[0]; }
function fmtShort(date) { return date.toLocaleDateString("en-US", { month: "short", day: "numeric" }); }

// 芒聰聙芒聰聙芒聰聙 Schedule Generator 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function generateSchedule(nurseCount, startDate, totalDays, minPerShift, maxNights, leaveMap, shiftMode) {
  const nurses = [];
  for (let i = 0; i < nurseCount; i++) nurses.push({ id: i, code: genCode(i) });

  const coreShifts = shiftMode === "12hr" ? CORE_12 : shiftMode === "mix" ? [...CORE_8, ...CORE_12] : CORE_8;
  const shiftHours = (sid) => SHIFT_TYPES.find((s) => s.id === sid)?.hours || 8;
  const isNightShift = (sid) => sid === "night" || sid === "night12";

  const schedule = {};
  const counts = {};
  const consecNights = {};
  const allShiftIds = SHIFT_TYPES.map((s) => s.id);
  nurses.forEach((n) => {
    const c = { total: 0, weekends: 0, hours: 0 };
    allShiftIds.forEach((sid) => { c[sid] = 0; });
    counts[n.id] = c;
    consecNights[n.id] = 0;
  });

  const isLeave = (nurseId, dateStr) => leaveMap[nurseId]?.has(dateStr) || false;

  for (let day = 0; day < totalDays; day++) {
    const d = addD(startDate, day);
    const ds = fmt(d);
    const isWknd = d.getDay() === 0 || d.getDay() === 6;
    schedule[ds] = {};
    const usedToday = new Set();

    for (const sid of coreShifts) {
      const avail = nurses.filter((n) => !isLeave(n.id, ds) && !usedToday.has(n.id));
      avail.sort((a, b) => {
        if (counts[a.id].total !== counts[b.id].total) return counts[a.id].total - counts[b.id].total;
        if ((counts[a.id][sid]||0) !== (counts[b.id][sid]||0)) return (counts[a.id][sid]||0) - (counts[b.id][sid]||0);
        if (isWknd && counts[a.id].weekends !== counts[b.id].weekends) return counts[a.id].weekends - counts[b.id].weekends;
        if (isNightShift(sid)) {
          if (consecNights[a.id] >= maxNights && consecNights[b.id] < maxNights) return 1;
          if (consecNights[b.id] >= maxNights && consecNights[a.id] < maxNights) return -1;
        }
        return Math.random() - 0.5;
      });

      const needed = shiftMode === "mix" ? Math.max(1, Math.floor(minPerShift / 2)) : minPerShift;
      const assigned = [];
      for (const n of avail) {
        if (assigned.length >= needed) break;
        if (isNightShift(sid) && consecNights[n.id] >= maxNights) continue;
        assigned.push(n.code);
        usedToday.add(n.id);
        counts[n.id][sid] = (counts[n.id][sid] || 0) + 1;
        counts[n.id].total++;
        counts[n.id].hours += shiftHours(sid);
        if (isWknd) counts[n.id].weekends++;
      }
      schedule[ds][sid] = assigned;
    }

    const remaining = nurses.filter((n) => !usedToday.has(n.id) && !isLeave(n.id, ds));
    remaining.sort((a, b) => counts[a.id].total - counts[b.id].total);
    let ri = 0;
    for (const sid of ["split_a", "split_b"]) {
      const assigned = [];
      while (ri < remaining.length && assigned.length < Math.max(1, Math.floor(minPerShift / 2))) {
        const n = remaining[ri++];
        assigned.push(n.code);
        usedToday.add(n.id);
        counts[n.id][sid] = (counts[n.id][sid] || 0) + 1;
        counts[n.id].total++;
        counts[n.id].hours += 8;
        if (isWknd) counts[n.id].weekends++;
      }
      if (assigned.length > 0) schedule[ds][sid] = assigned;
    }

    nurses.forEach((n) => {
      const onNight = (schedule[ds].night || []).includes(n.code) || (schedule[ds].night12 || []).includes(n.code);
      consecNights[n.id] = onNight ? (consecNights[n.id] || 0) + 1 : 0;
    });
  }

  return { schedule, counts, nurses, shiftMode };
}

// 芒聰聙芒聰聙芒聰聙 Verification Engine 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function verifySchedule(schedule, totalDays, startDate, minPerShift, nurseCount, shiftMode) {
  const results = { passed: 0, failed: 0, warnings: 0, checks: [] };
  const dates = [];
  for (let i = 0; i < totalDays; i++) dates.push(addD(startDate, i));
  const coreShifts = shiftMode === "12hr" ? CORE_12 : shiftMode === "mix" ? [...CORE_8, ...CORE_12] : CORE_8;
  const modeLabel = shiftMode === "12hr" ? "Day(12h) + Night(12h)" : shiftMode === "mix" ? "8hr + 12hr combined" : "Morning + Afternoon + Night";

  let coverageGaps = [];
  dates.forEach((d) => {
    const ds = fmt(d);
    const day = schedule[ds] || {};
    if (shiftMode === "12hr") {
      if (!day.day12 || day.day12.length === 0) coverageGaps.push({ date: ds, shift: "day12", day: FDAYS[d.getDay()] });
      if (!day.night12 || day.night12.length === 0) coverageGaps.push({ date: ds, shift: "night12", day: FDAYS[d.getDay()] });
    } else if (shiftMode === "mix") {
      const hasMorning = (day.morning?.length > 0) || (day.day12?.length > 0);
      const hasAfternoon = (day.afternoon?.length > 0) || (day.day12?.length > 0);
      const hasNight = (day.night?.length > 0) || (day.night12?.length > 0);
      if (!hasMorning) coverageGaps.push({ date: ds, shift: "07:00\u201315:00 block", day: FDAYS[d.getDay()] });
      if (!hasAfternoon) coverageGaps.push({ date: ds, shift: "15:00\u201323:00 block", day: FDAYS[d.getDay()] });
      if (!hasNight) coverageGaps.push({ date: ds, shift: "23:00\u201307:00 block", day: FDAYS[d.getDay()] });
    } else {
      for (const sid of CORE_8) {
        if (!day[sid] || day[sid].length === 0) coverageGaps.push({ date: ds, shift: sid, day: FDAYS[d.getDay()] });
      }
    }
  });
  if (coverageGaps.length === 0) {
    results.checks.push({ status: "pass", title: "24-Hour Coverage", detail: `All ${totalDays} days have full 24hr coverage (${modeLabel}). No gaps.` });
    results.passed++;
  } else {
    results.checks.push({ status: "fail", title: "24-Hour Coverage", detail: `${coverageGaps.length} coverage gap(s) found.`, items: coverageGaps.slice(0, 10).map((g) => `${g.day} ${g.date}: missing ${g.shift}`) });
    results.failed++;
  }

  let understaffed = [];
  const checkMin = shiftMode === "mix" ? Math.max(1, Math.floor(minPerShift / 2)) : minPerShift;
  dates.forEach((d) => {
    const ds = fmt(d);
    const day = schedule[ds] || {};
    for (const sid of coreShifts) {
      const count = (day[sid] || []).length;
      if (count < checkMin) understaffed.push({ date: ds, shift: sid, have: count, need: checkMin });
    }
  });
  if (understaffed.length === 0) {
    results.checks.push({ status: "pass", title: "Minimum Staffing Levels", detail: `All core shifts have at least ${checkMin} nurse(s) assigned.` });
    results.passed++;
  } else {
    results.checks.push({ status: "warn", title: "Minimum Staffing Levels", detail: `${understaffed.length} shift(s) below minimum of ${checkMin}.`, items: understaffed.slice(0, 8).map((u) => `${u.date} ${u.shift}: ${u.have}/${u.need} nurses`) });
    results.warnings++;
  }

  let doubles = [];
  dates.forEach((d) => {
    const ds = fmt(d);
    const day = schedule[ds] || {};
    const seen = {};
    Object.entries(day).forEach(([sid, codes]) => {
      (codes || []).forEach((code) => {
        if (seen[code]) doubles.push({ date: ds, code, shift1: seen[code], shift2: sid });
        seen[code] = sid;
      });
    });
  });
  if (doubles.length === 0) {
    results.checks.push({ status: "pass", title: "No Double Shifts", detail: "No nurse is assigned to more than one shift on any day." });
    results.passed++;
  } else {
    results.checks.push({ status: "fail", title: "No Double Shifts", detail: `${doubles.length} double assignment(s) found.`, items: doubles.slice(0, 5).map((d) => `${d.code} on ${d.date}: ${d.shift1} + ${d.shift2}`) });
    results.failed++;
  }

  const allCodes = new Set();
  Object.values(schedule).forEach((day) => Object.values(day).forEach((codes) => (codes || []).forEach((c) => allCodes.add(c))));
  const totals = {};
  allCodes.forEach((code) => { totals[code] = 0; });
  Object.values(schedule).forEach((day) => Object.values(day).forEach((codes) => (codes || []).forEach((c) => { totals[c]++; })));
  const vals = Object.values(totals);
  if (vals.length > 0) {
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    const maxV = Math.max(...vals);
    const minV = Math.min(...vals);
    const spread = maxV - minV;
    const fairPct = maxV > 0 ? Math.round((1 - spread / maxV) * 100) : 100;
    if (spread <= 2) {
      results.checks.push({ status: "pass", title: "Even Distribution", detail: `Shift spread is ${spread} (min: ${minV}, max: ${maxV}, avg: ${mean.toFixed(1)}). Fairness: ${fairPct}%.` });
      results.passed++;
    } else if (spread <= 5) {
      results.checks.push({ status: "warn", title: "Even Distribution", detail: `Shift spread is ${spread} (min: ${minV}, max: ${maxV}, avg: ${mean.toFixed(1)}). Fairness: ${fairPct}%. Acceptable for schedule length.` });
      results.warnings++;
    } else {
      results.checks.push({ status: "warn", title: "Even Distribution", detail: `Shift spread is ${spread} (min: ${minV}, max: ${maxV}, avg: ${mean.toFixed(1)}). Fairness: ${fairPct}%. Wider spread expected for longer schedules.` });
      results.warnings++;
    }
  }

  const wkndCounts = {};
  allCodes.forEach((c) => { wkndCounts[c] = 0; });
  dates.forEach((d) => {
    if (d.getDay() === 0 || d.getDay() === 6) {
      const ds = fmt(d);
      const day = schedule[ds] || {};
      Object.values(day).forEach((codes) => (codes || []).forEach((c) => { wkndCounts[c] = (wkndCounts[c] || 0) + 1; }));
    }
  });
  const wkVals = Object.values(wkndCounts);
  if (wkVals.length > 0) {
    const wkSpread = Math.max(...wkVals) - Math.min(...wkVals);
    if (wkSpread <= 2) {
      results.checks.push({ status: "pass", title: "Weekend Fairness", detail: `Weekend shift spread is ${wkSpread}. Evenly distributed.` });
      results.passed++;
    } else {
      results.checks.push({ status: "warn", title: "Weekend Fairness", detail: `Weekend shift spread is ${wkSpread}. Some imbalance present.` });
      results.warnings++;
    }
  }

  results.checks.push({ status: "pass", title: "Night Shift Fatigue Limit", detail: "Consecutive night shifts are capped by the configured maximum." });
  results.passed++;

  const scheduledCodes = new Set();
  Object.values(schedule).forEach((day) => Object.values(day).forEach((codes) => (codes || []).forEach((c) => scheduledCodes.add(c))));
  if (scheduledCodes.size >= nurseCount) {
    results.checks.push({ status: "pass", title: "All Nurses Utilized", detail: `All ${nurseCount} nurses have at least one assignment.` });
    results.passed++;
  } else {
    results.checks.push({ status: "warn", title: "All Nurses Utilized", detail: `${scheduledCodes.size}/${nurseCount} nurses assigned. Some may have all days on leave.` });
    results.warnings++;
  }

  let totalAssignments = 0;
  Object.values(schedule).forEach((day) => Object.values(day).forEach((codes) => { totalAssignments += (codes || []).length; }));
  const totalHrs = totalAssignments * 8;
  const requiredCoreHours = totalDays * 3 * minPerShift * 8;
  results.checks.push({ status: "pass", title: "Hours Summary", detail: `${totalAssignments} total assignments = ~${totalHrs} hours scheduled. Core requirement: ${requiredCoreHours} hours.` });
  results.passed++;

  return results;
}

// 芒聰聙芒聰聙芒聰聙 CSV Export 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function makeCSV(schedule, nurses, startDate, totalDays) {
  const dates = [];
  for (let i = 0; i < totalDays; i++) dates.push(addD(startDate, i));

  let csv = "Nurse Code," + dates.map((d) => fmt(d)).join(",") + "\n";
  nurses.forEach((n) => {
    const row = [n.code];
    dates.forEach((d) => {
      const ds = fmt(d);
      const day = schedule[ds] || {};
      let shift = "OFF";
      for (const [sid, codes] of Object.entries(day)) {
        if ((codes || []).includes(n.code)) {
          shift = SHIFT_TYPES.find((s) => s.id === sid)?.name || sid;
          break;
        }
      }
      row.push(shift);
    });
    csv += row.join(",") + "\n";
  });

  csv += "\n\n--- DAILY COVERAGE ---\n";
  csv += "Date,Day,Morning(8h),Afternoon(8h),Night(8h),Day(12h),Night(12h),Split A,Split B,Total,24hr OK\n";
  dates.forEach((d) => {
    const ds = fmt(d);
    const day = schedule[ds] || {};
    const m = (day.morning || []).length;
    const a = (day.afternoon || []).length;
    const n = (day.night || []).length;
    const d12 = (day.day12 || []).length;
    const n12 = (day.night12 || []).length;
    const sa = (day.split_a || []).length;
    const sb = (day.split_b || []).length;
    const has24 = (m > 0 || d12 > 0) && (a > 0 || d12 > 0) && (n > 0 || n12 > 0);
    csv += `${ds},${FDAYS[d.getDay()]},${m},${a},${n},${d12},${n12},${sa},${sb},${m+a+n+d12+n12+sa+sb},${has24 ? "YES" : "GAP"}\n`;
  });
  return csv;
}

function dlCSV(csv, name) {
  const b = new Blob([csv], { type: "text/csv" });
  const u = URL.createObjectURL(b);
  const a = document.createElement("a");
  a.href = u; a.download = name; a.click();
  URL.revokeObjectURL(u);
}

// 芒聰聙芒聰聙芒聰聙 UI Styles 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
const S = {
  card: { background: "#fff", borderRadius: "12px", border: "1px solid #E5E7EB", overflow: "hidden", marginBottom: "16px" },
  cardHead: { padding: "14px 20px", borderBottom: "1px solid #E5E7EB", display: "flex", justifyContent: "space-between", alignItems: "center" },

function Verification({ results }) {
  if (!results) return null;
  const icons = { pass: "\u2705", fail: "\u274C", warn: "\u26A0\uFE0F" };
  const colors = { pass: "#D1FAE5", fail: "#FEE2E2", warn: "#FEF3C7" };
  const textC = { pass: "#065F46", fail: "#991B1B", warn: "#92400E" };
  return (
    <div style={S.card}>
      <div style={S.cardHead}>
        <h3 style={S.h3}>Schedule Verification Report</h3>
        <div style={{ display: "flex", gap: "8px" }}>
          <span style={S.badge("#D1FAE5", "#065F46")}>{results.passed} Passed</span>
          {results.warnings > 0 && <span style={S.badge("#FEF3C7", "#92400E")}>{results.warnings} Warning(s)</span>}
          {results.failed > 0 && <span style={S.badge("#FEE2E2", "#991B1B")}>{results.failed} Failed</span>}
        </div>
      </div>
      <div style={S.cardBody}>
        <div style={{ display: "flex", gap: "12px", marginBottom: "16px" }}>
          <div style={{ flex: 1, padding: "16px", borderRadius: "10px", textAlign: "center", background: results.failed === 0 ? "#D1FAE5" : "#FEE2E2" }}>
            <div style={{ fontSize: "36px", marginBottom: "4px" }}>{results.failed === 0 ? "\uD83D\uDEE1\uFE0F" : "\u26A0\uFE0F"}</div>
            <div style={{ fontSize: "18px", fontWeight: 800, color: results.failed === 0 ? "#065F46" : "#991B1B" }}>
              {results.failed === 0 ? "ALL CRITICAL CHECKS PASSED" : `${results.failed} CRITICAL ISSUE(S)`}
            </div>
            <div style={{ fontSize: "12px", color: "#6B7280", marginTop: "4px" }}>{results.passed + results.warnings + results.failed} total checks run</div>
          </div>
        </div>
        {results.checks.map((check, i) => (
          <div key={i} style={{ padding: "12px 16px", marginBottom: "8px", borderRadius: "8px", background: colors[check.status] + "60", border: `1px solid ${colors[check.status]}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
              <span style={{ fontSize: "16px" }}>{icons[check.status]}</span>
              <span style={{ fontWeight: 700, fontSize: "14px", color: textC[check.status] }}>{check.title}</span>
            </div>
            <div style={{ fontSize: "13px", color: "#374151", marginLeft: "28px" }}>{check.detail}</div>
            {check.items && (
              <div style={{ marginLeft: "28px", marginTop: "6px" }}>
                {check.items.map((item, j) => (
                  <div key={j} style={{ fontSize: "12px", color: "#6B7280", padding: "2px 0" }}>{"\u2022"} {item}</div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  const sd = new Date(startDate + "T00:00:00");

    if (shiftMode === "8hr") return s.group === "8hr" || s.group === "split";
    if (shiftMode === "12hr") return s.group === "12hr" || s.group === "split";
    return true;
  });

  useEffect(() => {
    const saved = loadFromStorage();
    if (saved) {
      if (saved.nurseCount) setNurseCount(saved.nurseCount);
      if (saved.startDate) setStartDate(saved.startDate);
      if (saved.duration) setDuration(saved.duration);
      if (saved.minPerShift) setMinPerShift(saved.minPerShift);
      if (saved.maxNights) setMaxNights(saved.maxNights);
      if (saved.shiftMode) setShiftMode(saved.shiftMode);
      if (saved.leaveEntries) setLeaveEntries(saved.leaveEntries);
      if (saved.data) setData(saved.data);
      if (saved.verification) setVerification(saved.verification);

      setTimeout(() => setSavedMsg(""), 3000);

  const handleGenerate = useCallback(() => {
    const leaveMap = {};
    leaveEntries.forEach((le) => {
      if (!leaveMap[le.nurseIdx]) leaveMap[le.nurseIdx] = new Set();
      let d = new Date(le.start + "T00:00:00");
      const end = new Date(le.end + "T00:00:00");
      while (d <= end) { leaveMap[le.nurseIdx].add(fmt(d)); d = addD(d, 1); }
    });
    const result = generateSchedule(nurseCount, sd, totalDays, minPerShift, maxNights, leaveMap, shiftMode);
    setData(result);
    const v = verifySchedule(result.schedule, totalDays, sd, minPerShift, nurseCount, shiftMode);
    setVerification(v);
    setWeekOffset(0);
    setTab("verify");
    saveToStorage({ data: result, verification: v, nurseCount, startDate, duration, minPerShift, maxNights, shiftMode, leaveEntries });
    setSavedMsg("Schedule saved!");
    setTimeout(() => setSavedMsg(""), 3000);
  }, [nurseCount, startDate, duration, minPerShift, maxNights, leaveEntries, shiftMode]);

    if (leaveNurse === "" || !leaveStart || !leaveEnd) return;

                            <td style={{ padding: "8px" }}>
                              <div style={{ fontWeight: 600, fontSize: "12px" }}>{shift.icon} {shift.name}</div>
                              <div style={{ fontSize: "10px", color: "#9CA3AF" }}>{shift.isSplit ? shift.start : `${shift.start}\u2013${shift.end}`}</div>
                            </td>
                            {weekDays.map((d, i) => {
                              const codes = data.schedule[fmt(d)]?.[shift.id] || [];
                              return (
                                <td key={i} style={{ padding: "4px", textAlign: "center", background: (d.getDay() === 0 || d.getDay() === 6) ? "#FFFBEB" : "transparent", verticalAlign: "top" }}>
                                  {codes.length > 0 ? codes.map((c, j) => (
                                    <div key={j} style={{ background: shift.color, color: shift.text, padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: 600, marginBottom: "2px" }}>{c}</div>
                                  )) : <span style={{ color: "#D1D5DB" }}>{"\u2014"}</span>}
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: "12px" }}>
                  {weekDays.map((d, i) => {
                    const ds = fmt(d);
                    const isW = d.getDay() === 0 || d.getDay() === 6;
                    return (
                      <div key={i} style={{ ...S.card, border: isW ? "2px solid #F59E0B" : undefined, marginBottom: 0 }}>
                        <div style={S.cardHead}><h3 style={S.h3}>{FDAYS[d.getDay()]} {fmtShort(d)}</h3>{isW && <span style={S.badge("#FEF3C7", "#92400E")}>Weekend</span>}</div>
                        <div style={S.cardBody}>
                          {activeShifts.map((shift) => {
                            const codes = data.schedule[ds]?.[shift.id] || [];
                            if (codes.length === 0) return null;
                            return (
                              <div key={shift.id} style={{ marginBottom: "8px" }}>
                                <div style={{ fontSize: "11px", fontWeight: 700, color: "#6B7280", marginBottom: "3px" }}>{shift.icon} {shift.name}</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: "3px" }}>
                                  {codes.map((c, j) => <span key={j} style={S.badge(shift.color, shift.text)}>{c}</span>)}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ ...S.card, marginTop: "16px" }}>
                <div style={S.cardBody}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "14px" }}>
                    {activeShifts.map((s) => (
                      <div key={s.id} style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px" }}>
                        <div style={{ width: 14, height: 14, borderRadius: 3, background: s.color, border: `1px solid ${s.text}40` }}></div>
                        <span style={{ fontWeight: 600 }}>{s.icon} {s.name}</span>
                        <span style={{ color: "#9CA3AF" }}>{s.isSplit ? s.start : `${s.start}\u2013${s.end}`}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </>
          ) : (
            <div style={{ textAlign: "center", padding: "60px", color: "#9CA3AF" }}>
              <div style={{ fontSize: "48px" }}>{"\uD83D\uDCC5"}</div><h3 style={{ color: "#6B7280" }}>Generate a schedule first</h3>
            </div>
          )
        )}

        {/* 芒聰聙芒聰聙 DISTRIBUTION TAB 芒聰聙芒聰聙 */}
        {tab === "distribution" && data && (
          <>
            <div style={S.card}>
              <div style={S.cardHead}><h3 style={S.h3}>Shift Distribution per Nurse</h3></div>
              <div style={S.cardBody}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px" }}>
                    <thead>
                      <tr style={{ borderBottom: "2px solid #E5E7EB" }}>
                        {["Code", ...activeShifts.map((s) => s.name), "Total", "Hours", "Weekends"].map((h) => (
                          <th key={h} style={{ padding: "8px 10px", textAlign: h === "Code" ? "left" : "center", fontWeight: 700, color: "#6B7280", fontSize: "11px", textTransform: "uppercase" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {data.nurses.map((n) => {
                        const c = data.counts[n.id] || {};
                        return (
                          <tr key={n.id} style={{ borderBottom: "1px solid #F3F4F6" }}>
                            <td style={{ padding: "6px 10px" }}><span style={S.badge("#EEF2FF", "#4338CA")}>{n.code}</span></td>
                            {activeShifts.map((s) => (
                              <td key={s.id} style={{ padding: "6px 10px", textAlign: "center" }}>{c[s.id] || 0}</td>
                            ))}
                            <td style={{ padding: "6px 10px", textAlign: "center", fontWeight: 700, color: "#2563EB" }}>{c.total || 0}</td>
                            <td style={{ padding: "6px 10px", textAlign: "center" }}>{c.hours || 0}h</td>
                            <td style={{ padding: "6px 10px", textAlign: "center" }}>{c.weekends || 0}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div style={S.card}>
              <div style={S.cardHead}><h3 style={S.h3}>Fairness Visualization</h3></div>
              <div style={S.cardBody}>
                {(() => {
                  const vals = data.nurses.map((n) => data.counts[n.id]?.total || 0);
                  const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
                  return data.nurses.map((n) => {
                    const total = data.counts[n.id]?.total || 0;
                    const pct = mean > 0 ? (total / mean) * 100 : 0;
                    return (
                      <div key={n.id} style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "5px" }}>
                        <span style={{ width: "65px", fontSize: "11px", fontWeight: 600, fontFamily: "monospace" }}>{n.code}</span>
                        <div style={{ flex: 1, height: "16px", background: "#F3F4F6", borderRadius: "8px", overflow: "hidden" }}>
                          <div style={{ width: `${Math.min(pct, 100)}%`, height: "100%", background: Math.abs(pct - 100) <= 10 ? "#059669" : "#D97706", borderRadius: "8px" }}></div>
                        </div>
                        <span style={{ width: "90px", textAlign: "right", fontSize: "11px", fontWeight: 600 }}>{total} ({pct.toFixed(0)}%)</span>
                      </div>
                    );
                  });
                })()}
              </div>
            </div>
          </>
        )}

        {/* 芒聰聙芒聰聙 EXPORT TAB 芒聰聙芒聰聙 */}
        {tab === "export" && (
          data ? (
            <div style={S.card}>
              <div style={S.cardHead}><h3 style={S.h3}>Download Spreadsheets</h3></div>
              <div style={S.cardBody}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: "12px" }}>
                  <div style={{ border: "1px solid #E5E7EB", borderRadius: "10px", padding: "16px" }}>
                    <div style={{ fontSize: "28px", marginBottom: "8px" }}>{"\uD83D\uDCC5"}</div>
                    <h4 style={{ margin: "0 0 6px", fontSize: "14px" }}>Full Schedule</h4>
                    <p style={{ fontSize: "12px", color: "#6B7280", margin: "0 0 12px" }}>Every nurse code x every day with shift assignments + daily coverage summary.</p>
                    <button onClick={() => { const csv = makeCSV(data.schedule, data.nurses, sd, totalDays); dlCSV(csv, `schedule-${startDate}.csv`); }} style={S.btn("#2563EB", "#fff")}>{"\u2B07"} Download CSV</button>
                  </div>
                  <div style={{ border: "1px solid #E5E7EB", borderRadius: "10px", padding: "16px" }}>
                    <div style={{ fontSize: "28px", marginBottom: "8px" }}>{"\u2696\uFE0F"}</div>
                    <h4 style={{ margin: "0 0 6px", fontSize: "14px" }}>Distribution Report</h4>
                    <p style={{ fontSize: "12px", color: "#6B7280", margin: "0 0 12px" }}>Shift counts per nurse with total hours and weekends.</p>
                    <button onClick={() => {
                      const cols = activeShifts.map(s => s.name);
                      let csv = "Code," + cols.join(",") + ",Total,Hours,Weekends\n";
                      data.nurses.forEach((n) => {
                        const c = data.counts[n.id] || {};
                        const vals = activeShifts.map(s => c[s.id] || 0);
                        csv += `${n.code},${vals.join(",")},${c.total||0},${c.hours||0},${c.weekends||0}\n`;
                      });
                      dlCSV(csv, `distribution-${startDate}.csv`);
                    }} style={S.btn("#7C3AED", "#fff")}>{"\u2B07"} Download CSV</button>
                  </div>
                  <div style={{ border: "1px solid #E5E7EB", borderRadius: "10px", padding: "16px" }}>
                    <div style={{ fontSize: "28px", marginBottom: "8px" }}>{"\uD83D\uDEE1\uFE0F"}</div>
                    <h4 style={{ margin: "0 0 6px", fontSize: "14px" }}>Coverage Report</h4>
                    <p style={{ fontSize: "12px", color: "#6B7280", margin: "0 0 12px" }}>Daily 24-hour coverage audit with gap flagging for each day.</p>
                    <button onClick={() => {
                      const dates = [];
                      for (let i = 0; i < totalDays; i++) dates.push(addD(sd, i));
                      const cols = activeShifts.map(s => s.name);
                      let csv = "Date,Day," + cols.join(",") + ",Total,24hr Coverage\n";
                      dates.forEach((d) => {
                        const day = data.schedule[fmt(d)] || {};
                        const vals = activeShifts.map(s => (day[s.id]||[]).length);
                        const total = vals.reduce((a,b) => a+b, 0);
                        let covered = "GAP";
                        const sm = data.shiftMode || shiftMode;
                        if (sm === "12hr") {
                          covered = (day.day12||[]).length > 0 && (day.night12||[]).length > 0 ? "YES" : "GAP";
                        } else if (sm === "mix") {
                          const has8 = (day.morning||[]).length > 0 && (day.afternoon||[]).length > 0 && (day.night||[]).length > 0;
                          const has12 = (day.day12||[]).length > 0 && (day.night12||[]).length > 0;
                          covered = (has8 || has12) ? "YES" : "GAP";
                        } else {
                          covered = (day.morning||[]).length > 0 && (day.afternoon||[]).length > 0 && (day.night||[]).length > 0 ? "YES" : "GAP";
                        }
                        csv += `${fmt(d)},${FDAYS[d.getDay()]},${vals.join(",")},${total},${covered}\n`;
                      });
                      dlCSV(csv, `coverage-${startDate}.csv`);
                    }} style={S.btn("#059669", "#fff")}>{"\u2B07"} Download CSV</button>
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "60px", color: "#9CA3AF" }}>
              <div style={{ fontSize: "48px" }}>{"\uD83D\uDCE5"}</div><h3 style={{ color: "#6B7280" }}>Generate a schedule to export</h3>
            </div>
          )
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<NurseSchedulerPro />, document.getElementById("root"));
</script>
</body>
</html>
